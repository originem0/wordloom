server {
    listen 80;
    server_name _;

    # For initial certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    # Redirect all other HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$host$request_uri;

    # Temporary: proxy directly (before SSL is configured)
    client_max_body_size 12M;

    # Static assets with long cache
    location /assets/ {
        root /app/dist/client;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA files (manifest, icons, SW)
    location ~ ^/(manifest\.json|icon-.*\.png|icon\.svg|sw\.js|workbox-.*\.js)$ {
        root /app/dist/client;
        expires 1d;
    }

    # API and everything else -> Hono
    location / {
        proxy_pass http://app:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}

