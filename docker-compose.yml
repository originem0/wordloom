services:
  app:
    build: .
    # Bind to localhost only; host nginx will reverse-proxy to this port.
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - app-data:/app/data
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN}
      - AUTH_SECRET=${AUTH_SECRET}
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

volumes:
  app-data:
